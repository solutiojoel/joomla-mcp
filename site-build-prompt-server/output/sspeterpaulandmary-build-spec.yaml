homepage:
  sourceOutlineBlueprint: blueprints/home-outline-remap-test.yaml
  artworkNotes: |
    Homepage composition should include hero, quicklinks, livestream/online Mass emphasis, parish announcements, and a practical footer/contact zone.
    Keep the tone welcoming and Catholic without over-stylizing the design.
  particles:
    - section: top
      particleType: contentarray
      title: Parish Announcements
      articleBinding:
        mode: category
        categoryTitle: Alerts
        articleTitle: ''
        total: 6
        createIfMissing: true
        generationNotes: Create a homepage announcements feed populated from parish notices.
      notes: Pull from alert/news content rather than hardcoding.
    - section: feature
      particleType: contentarray
      title: News & Events
      articleBinding:
        mode: category
        categoryTitle: News
        articleTitle: ''
        total: 6
        createIfMissing: true
        generationNotes: Use parish announcements/news items as the visible homepage feed.
      notes: ''
    - section: utility
      particleType: custom
      title: Sunday Mass Livestream
      articleBinding:
        mode: explicit_article
        categoryTitle: Homepage Articles
        articleTitle: Sunday Mass Livestream
        total: 1
        createIfMissing: true
        generationNotes: Create a short article pointing visitors to the weekly online Mass stream and archive behavior.
      notes: Preserve the prominence of the livestream from the current homepage.
